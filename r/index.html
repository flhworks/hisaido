<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ご相談受付｜HISAIDO</title>
    <meta name="description" content="HISAIDO家財相談フォームへのご案内です。">
    <style>
        :root{color-scheme:light;--navy:#10253d;--gold:#c69a52;--ink:#172432;--muted:#5a6876;--bg:#f4f3ef;--line:#d9e1e7}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;line-height:1.75;padding:20px}.card{width:min(640px,100%);border:1px solid var(--line);border-top:7px solid var(--gold);border-radius:20px;background:#fff;padding:38px;text-align:center;box-shadow:0 14px 40px rgba(16,37,61,.1)}.brand{margin:0 0 22px;color:var(--navy);font-weight:900;letter-spacing:.12em}.spinner{width:42px;height:42px;margin:0 auto 22px;border:4px solid #e5e9ed;border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}h1{margin:0;color:var(--navy);font-size:clamp(25px,5vw,34px)}p{color:var(--muted)}a{display:inline-flex;align-items:center;justify-content:center;width:min(100%,480px);min-height:56px;margin-top:9px;border-radius:999px;background:var(--gold);color:#14263a;text-decoration:none;padding:13px 22px;font-weight:900}:focus-visible{outline:3px solid #efbd5c;outline-offset:3px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:600px){.card{padding:28px 18px;border-radius:15px}}
    </style>
</head>
<body>
    <main class="card">
        <p class="brand">HISAIDO</p>
        <div class="spinner" aria-hidden="true"></div>
        <h1>相談フォームを準備しています</h1>
        <p>自動で画面が変わらない場合は、下のボタンを押してください。</p>
        <a id="continue" href="https://script.google.com/macros/s/AKfycbwlQUXBFofenTSxIbFNXO2CvheeHWL0nku9upnQ7MdQYv2sEWfwfPx1dVC06QpYb-gYZQ/exec">相談フォームへ進む</a>
        <noscript><p>続行するにはJavaScriptを有効にするか、上のボタンを押してください。</p></noscript>
    </main>
    <script>
        (() => {
            'use strict';
            const endpoint = 'https://script.google.com/macros/s/AKfycbwlQUXBFofenTSxIbFNXO2CvheeHWL0nku9upnQ7MdQYv2sEWfwfPx1dVC06QpYb-gYZQ/exec';
            const source = new URL(window.location.href);
            const target = new URL(endpoint);
            const referralCode = String(source.searchParams.get('c') || 'DIRECT').trim().toUpperCase();
            const campaignPattern = /^CMP-[A-Z0-9]{4,24}$/;
            const channelPattern = /^(line|email|web|qr|print|partner|direct|other|social|cpc)$/;
            const versionPattern = /^\d{1,3}\.\d{1,3}$/;

            if (referralCode === 'DIRECT' || /^[23456789ABCDEFGHJKLMNPQRSTUVWXYZ]{8}$/.test(referralCode)) {
                target.searchParams.set('c', referralCode);
            } else {
                target.searchParams.set('c', 'INVALID');
            }

            const campaign = String(source.searchParams.get('campaign') || '').trim().toUpperCase();
            const utmCampaign = String(source.searchParams.get('utm_campaign') || '').trim().toUpperCase();
            const utmSource = String(source.searchParams.get('utm_source') || '').trim().toLowerCase();
            const utmMedium = String(source.searchParams.get('utm_medium') || '').trim().toLowerCase();
            const version = String(source.searchParams.get('v') || '').trim();
            if (campaignPattern.test(campaign)) target.searchParams.set('campaign', campaign);
            if (campaignPattern.test(utmCampaign)) target.searchParams.set('utm_campaign', utmCampaign);
            if (channelPattern.test(utmSource)) target.searchParams.set('utm_source', utmSource);
            if (channelPattern.test(utmMedium)) target.searchParams.set('utm_medium', utmMedium);
            if (versionPattern.test(version)) target.searchParams.set('v', version);

            const destination = target.toString();
            document.getElementById('continue').href = destination;
            window.location.replace(destination);
        })();
    </script>
</body>
</html>
